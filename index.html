<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>IPTV Ultimate Hub</title>
  <style>
    /* ===== قاعدة التصميم ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-start: #1e1b4b;
      --bg-mid: #312e81;
      --bg-end1: #06b6d4;
      --bg-end2: #ec4899;
      --card-player-glow: rgba(0, 255, 200, 0.25);
      --card-player-border: linear-gradient(135deg, #00ffcc, #0096ff);
      --card-converter-glow: rgba(255, 100, 0, 0.25);
      --card-converter-border: linear-gradient(135deg, #ffaa00, #ff00aa);
      --text-primary: #ffffff;
      --text-secondary: #f0f9ff;
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.2);
      --shadow-card: 0 15px 35px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 25px 50px rgba(0, 0, 0, 0.5);
      --focus-ring: 0 0 0 4px white, 0 0 50px rgba(255,255,255,0.7);
      --font-main: 'Segoe UI', 'Tahoma', sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(-45deg, var(--bg-start), var(--bg-mid), var(--bg-end1), var(--bg-end2));
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      font-family: var(--font-main);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
      padding: 1.5rem;
      position: relative;
      color: var(--text-primary);
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== دوائر الزينة العائمة ===== */
    .circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 1;
      pointer-events: none;
    }
    .c1 {
      width: min(300px, 35vw);
      height: min(300px, 35vw);
      background: rgba(0, 255, 255, 0.33);
      top: -10%;
      right: -10%;
      animation: floatCircle 8s ease-in-out infinite;
    }
    .c2 {
      width: min(300px, 35vw);
      height: min(300px, 35vw);
      background: rgba(255, 0, 255, 0.33);
      bottom: -10%;
      left: -10%;
      animation: floatCircle 10s ease-in-out infinite reverse;
    }
    .c3 {
      width: min(200px, 25vw);
      height: min(200px, 25vw);
      background: rgba(255, 255, 0, 0.33);
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      animation: floatCircle 6s ease-in-out infinite alternate;
    }
    @keyframes floatCircle {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -40px) scale(1.1); }
    }

    /* ===== الحاوية الرئيسية ===== */
    .container {
      width: 100%;
      max-width: 1100px;
      text-align: center;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1.5rem, 3vw, 2.5rem);
    }

    /* ===== العنوان و الشعار ===== */
    .logo {
      font-size: clamp(4rem, 8vw, 6.5rem);
      filter: drop-shadow(0 0 20px rgba(255,255,255,0.7));
      animation: floatLogo 4s ease-in-out infinite;
    }
    @keyframes floatLogo {
      50% { transform: translateY(-12px); }
    }
    h1 {
      font-size: clamp(2.2rem, 5vw, 4rem);
      text-shadow: 0 0 20px rgba(255,255,255,0.5), 0 0 40px rgba(6,182,212,0.6);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }
    .subtitle {
      color: var(--text-secondary);
      font-size: clamp(0.95rem, 2vw, 1.4rem);
      opacity: 0.9;
      max-width: 600px;
      margin-bottom: 0.5rem;
    }

    /* ===== بطاقات التنقل ===== */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: stretch;
      gap: clamp(1.5rem, 3vw, 2.5rem);
      width: 100%;
    }

    .card {
      flex: 1 1 300px;
      max-width: 450px;
      text-decoration: none;
      padding: clamp(2rem, 4vw, 3.5rem) clamp(1.5rem, 3vw, 2.5rem);
      border-radius: 2rem;
      backdrop-filter: blur(25px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1), 
                  box-shadow 0.3s ease;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      outline: none;
      position: relative;
      cursor: pointer;
      /* لإضافة تأثير حدود متوهجة */
    }
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: transparent;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      transition: background 0.3s;
    }
    /* تخصيص بطاقة المشاهدة */
    .player {
      background: linear-gradient(135deg, var(--card-player-glow), rgba(0,150,255,0.25));
    }
    .player::before {
      background: var(--card-player-border);
    }
    /* تخصيص بطاقة التحويل */
    .converter {
      background: linear-gradient(135deg, var(--card-converter-glow), rgba(255,0,200,0.25));
    }
    .converter::before {
      background: var(--card-converter-border);
    }

    .card-icon {
      font-size: clamp(3.5rem, 8vw, 5rem);
      filter: drop-shadow(0 0 12px rgba(255,255,255,0.5));
    }
    .card h2 {
      font-size: clamp(1.7rem, 3.5vw, 2.4rem);
      text-shadow: 0 0 10px rgba(255,255,255,0.4);
    }
    .card p {
      line-height: 1.8;
      font-size: clamp(0.9rem, 1.5vw, 1.1rem);
      opacity: 0.9;
    }

    /* التفاعل عند التمرير أو التركيز */
    .card:hover,
    .card:focus-visible {
      transform: translateY(-10px) scale(1.03);
      box-shadow: var(--shadow-hover);
    }
    .card:focus-visible {
      box-shadow: var(--focus-ring), var(--shadow-hover);
    }
    .card:focus-visible::before {
      animation: borderGlow 2s linear infinite;
    }
    @keyframes borderGlow {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* ===== تذييل الصفحة ===== */
    .footer {
      color: var(--text-primary);
      opacity: 0.9;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      text-shadow: 0 0 10px rgba(255,255,255,0.3);
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
    }

    /* ===== استجابة للشاشات الصغيرة ===== */
    @media (max-width: 700px) {
      .cards {
        flex-direction: column;
        align-items: center;
      }
      .card {
        max-width: 100%;
        width: 100%;
      }
    }

    /* ===== تكييف خاص للتلفاز (شاشات كبيرة وعالية الدقة) ===== */
    @media (min-width: 1200px) and (min-height: 700px) {
      body {
        padding: 2rem;
      }
      .container {
        gap: 3rem;
      }
      .card {
        padding: 4rem 3rem;
      }
      h1 {
        font-size: 4.5rem;
      }
      .subtitle {
        font-size: 1.5rem;
      }
      .card h2 {
        font-size: 2.8rem;
      }
      .card p {
        font-size: 1.3rem;
      }
    }
    /* ضمان عدم التمرير غير المرغوب فيه على التلفاز */
    @media (min-height: 720px) {
      .container {
        justify-content: space-evenly;
      }
    }
  </style>
</head>
<body>
  <!-- دوائر الزينة -->
  <div class="circle c1" aria-hidden="true"></div>
  <div class="circle c2" aria-hidden="true"></div>
  <div class="circle c3" aria-hidden="true"></div>

  <div class="container">
    <div class="logo" aria-hidden="true">📡</div>

    <h1>IPTV ULTIMATE HUB</h1>

    <p class="subtitle">
      منصة احترافية لمشاهدة القنوات وإدارة روابط IPTV
    </p>

    <div class="cards" id="cardsContainer" role="navigation" aria-label="القائمة الرئيسية">
      <a href="player/index.html" class="card player" data-nav="0">
        <span class="card-icon" aria-hidden="true">📺</span>
        <h2>مشاهدة التلفاز</h2>
        <p>استمتع بمشاهدة القنوات والبث المباشر بواجهة سهلة وسريعة ومتوافقة مع جميع الأجهزة.</p>
      </a>

      <a href="converter/index.html" class="card converter" data-nav="1">
        <span class="card-icon" aria-hidden="true">🔄</span>
        <h2>تحويل الروابط</h2>
        <p>تحويل روابط IPTV إلى صيغ مختلفة بسرعة وسهولة مع دعم Xtream Codes.</p>
      </a>
    </div>

    <footer class="footer">
      المطور: الأستاذ محمد قادري
    </footer>
  </div>

  <!-- ***** نظام التنقل عبر الريموت (لوحة المفاتيح / جهاز التحكم) ***** -->
  <script>
    (function() {
      const cards = Array.from(document.querySelectorAll('.card'));
      if (!cards.length) return;

      // التركيز الابتدائي على البطاقة الأولى ليكون التنقل جاهزاً
      cards[0].focus({ preventScroll: true });

      /**
       * تحديد اتجاه عرض البطاقات (أفقي أم عمودي)
       * بالاعتماد على flex-direction للحاوية
       */
      function getOrientation() {
        const container = document.getElementById('cardsContainer');
        if (!container) return 'horizontal'; // افتراضي
        const style = window.getComputedStyle(container);
        const direction = style.flexDirection;
        return direction === 'row' || direction === 'row-reverse' ? 'horizontal' : 'vertical';
      }

      /**
       * حساب الفهرس الجديد عند الضغط على أحد مفاتيح الأسهم
       */
      function getNextIndex(currentIndex, key, total, orientation) {
        // في الوضع الأفقي نستجيب لليسار واليمين، وفي العمودي للأعلى والأسفل
        // لكننا نضيف مرونة: في الوضع العمودي يمكن استخدام اليمين/اليسار أيضاً للتنقل الدائري
        // لتجربة أفضل على التلفاز حيث قد يختلف اتجاه الأسهم حسب تصميم الـ UI
        if (orientation === 'horizontal') {
          if (key === 'ArrowRight') return (currentIndex + 1) % total;
          if (key === 'ArrowLeft') return (currentIndex - 1 + total) % total;
          // السماح بالأسهم العمودية أيضاً في الوضع الأفقي للتنقل الدائري (اختياري)
          if (key === 'ArrowDown') return (currentIndex + 1) % total;
          if (key === 'ArrowUp') return (currentIndex - 1 + total) % total;
        } else {
          // عمودي
          if (key === 'ArrowDown') return (currentIndex + 1) % total;
          if (key === 'ArrowUp') return (currentIndex - 1 + total) % total;
          // تنقل إضافي أفقي (مفيد لبعض الأجهزة)
          if (key === 'ArrowRight') return (currentIndex + 1) % total;
          if (key === 'ArrowLeft') return (currentIndex - 1 + total) % total;
        }
        return currentIndex;
      }

      document.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        // نتأكد أن العنصر النشط هو أحد بطاقات القائمة
        if (!active || !active.classList.contains('card')) return;

        const currentIndex = cards.indexOf(active);
        if (currentIndex === -1) return;

        const orientation = getOrientation();
        const newIndex = getNextIndex(currentIndex, e.key, cards.length, orientation);

        if (newIndex !== currentIndex) {
          e.preventDefault();
          cards[newIndex].focus({ preventScroll: false });
        }
      });

      // تحديث الاتجاه عند تغيير حجم الشاشة لا يؤثر على الحدث مباشرة،
      // ولكننا نقوم بإعادة حساب الاتجاه مع كل ضغطة لضمان الاستجابة الصحيحة.
    })();
  </script>
</body>
</html>
