<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>IPTV Ultimate Hub</title>
  <style>
    /* ===== إعادة الضبط الأساسية ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --font-main: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
      --text-primary: #ffffff;
      --text-secondary: #f0f9ff;
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.2);
      --shadow-card: 0 10px 25px rgba(0, 0, 0, 0.3);
      --shadow-hover: 0 15px 35px rgba(0, 0, 0, 0.5);
      --focus-ring: 0 0 0 3px white, 0 0 25px rgba(255,255,255,0.8);
    }

    body {
      height: 100vh;
      /* خلفية متحركة بألوان زاهية */
      background: linear-gradient(-45deg, #1e1b4b, #312e81, #06b6d4, #ec4899);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      font-family: var(--font-main);
      color: var(--text-primary);
      overflow: hidden; /* منع أي شريط تمرير */
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== دوائر الزينة ===== */
    .circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 1;
      pointer-events: none;
      opacity: 0.7;
    }
    .c1 {
      width: 25vmax;
      height: 25vmax;
      background: #00ffff;
      top: -10%;
      right: -10%;
      animation: floatCircle 10s ease-in-out infinite;
    }
    .c2 {
      width: 25vmax;
      height: 25vmax;
      background: #ff00ff;
      bottom: -10%;
      left: -10%;
      animation: floatCircle 12s ease-in-out infinite reverse;
    }
    .c3 {
      width: 15vmax;
      height: 15vmax;
      background: #ffff00;
      bottom: 15%;
      left: 50%;
      transform: translateX(-50%);
      animation: floatCircle 8s ease-in-out infinite alternate;
    }
    @keyframes floatCircle {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(2vw, -3vh) scale(1.1); }
    }

    /* ===== الحاوية الرئيسية ===== */
    .container {
      position: relative;
      z-index: 2;
      width: 90%;
      max-width: 1000px;
      height: 100vh; /* تمتد لكامل الشاشة */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-evenly; /* توزيع متساوٍ للعناصر */
      text-align: center;
      padding: 2vh 0;
    }

    /* ===== الشعار والعنوان ===== */
    .logo {
      font-size: clamp(2.5rem, 7vh, 5rem); /* تصغير الحجم ليتناسب مع الشاشات الصغيرة */
      filter: drop-shadow(0 0 15px rgba(255,255,255,0.7));
      animation: floatLogo 3s ease-in-out infinite;
      line-height: 1;
    }
    @keyframes floatLogo {
      50% { transform: translateY(-1vh); }
    }

    h1 {
      font-size: clamp(1.5rem, 4vh, 2.8rem);
      text-shadow: 0 0 15px rgba(255,255,255,0.5), 0 0 30px rgba(6,182,212,0.6);
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--text-secondary);
      font-size: clamp(0.8rem, 2vh, 1.2rem);
      opacity: 0.9;
      max-width: 80%;
    }

    /* ===== بطاقات القائمة ===== */
    .cards {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: stretch;
      gap: clamp(1rem, 3vh, 2rem);
      width: 100%;
      flex: 0 1 auto;
    }

    .card {
      flex: 1 1 180px;
      max-width: 380px;
      text-decoration: none;
      padding: clamp(1rem, 3vh, 2rem) clamp(1rem, 3vw, 2rem);
      border-radius: 1.5rem;
      backdrop-filter: blur(20px);
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      box-shadow: var(--shadow-card);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8vh;
      outline: none;
      cursor: pointer;
      position: relative;
    }

    /* حدود متوهجة عند التمرير/التركيز */
    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: transparent;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      transition: background 0.3s, opacity 0.3s;
    }

    .player {
      background: linear-gradient(135deg, rgba(0,255,200,0.25), rgba(0,150,255,0.25));
    }
    .player::before {
      background: linear-gradient(135deg, #00ffcc, #0096ff);
    }
    .converter {
      background: linear-gradient(135deg, rgba(255,100,0,0.25), rgba(255,0,200,0.25));
    }
    .converter::before {
      background: linear-gradient(135deg, #ffaa00, #ff00aa);
    }

    /* محتوى البطاقة */
    .card-icon {
      font-size: clamp(2.5rem, 6vh, 4rem);
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
      line-height: 1;
    }

    .card h2 {
      font-size: clamp(1.1rem, 2.5vh, 1.8rem);
      text-shadow: 0 0 8px rgba(255,255,255,0.4);
    }

    .card p {
      font-size: clamp(0.7rem, 1.6vh, 0.95rem);
      line-height: 1.6;
      opacity: 0.85;
    }

    /* تأثيرات التفاعل */
    .card:hover,
    .card:focus-visible {
      transform: translateY(-0.8vh) scale(1.02);
      box-shadow: var(--shadow-hover), 0 0 30px rgba(255,255,255,0.2);
    }

    .card:focus-visible {
      box-shadow: var(--focus-ring), var(--shadow-hover);
    }

    .card:focus-visible::before {
      animation: borderGlow 2s linear infinite;
    }

    @keyframes borderGlow {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    /* ===== التذييل ===== */
    .footer {
      font-size: clamp(0.7rem, 1.8vh, 0.9rem);
      opacity: 0.85;
      text-shadow: 0 0 8px rgba(255,255,255,0.3);
    }

    /* ===== ضبط إضافي للشاشات الصغيرة جداً (هواتف صغيرة) ===== */
    @media (max-width: 400px) {
      .cards {
        gap: 0.8rem;
      }
      .card {
        padding: 0.8rem 1rem;
        border-radius: 1rem;
      }
    }

    /* ===== شاشات كبيرة (تلفزيونات) ===== */
    @media (min-width: 1200px) and (min-height: 700px) {
      .container {
        padding: 3vh 0;
      }
      .cards {
        gap: 3vh;
      }
    }
  </style>
</head>
<body>
  <!-- دوائر الزينة -->
  <div class="circle c1" aria-hidden="true"></div>
  <div class="circle c2" aria-hidden="true"></div>
  <div class="circle c3" aria-hidden="true"></div>

  <div class="container">
    <div class="logo" aria-hidden="true">📡</div>

    <h1>IPTV ULTIMATE HUB</h1>

    <p class="subtitle">
      منصة احترافية لمشاهدة القنوات وإدارة روابط IPTV
    </p>

    <nav class="cards" id="cardsContainer" aria-label="القائمة الرئيسية">
      <a href="player/index.html" class="card player" data-nav="0">
        <span class="card-icon" aria-hidden="true">📺</span>
        <h2>مشاهدة التلفاز</h2>
        <p>استمتع بمشاهدة القنوات والبث المباشر بواجهة سهلة وسريعة.</p>
      </a>

      <a href="converter/index.html" class="card converter" data-nav="1">
        <span class="card-icon" aria-hidden="true">🔄</span>
        <h2>تحويل الروابط</h2>
        <p>تحويل روابط IPTV إلى صيغ مختلفة بسرعة وسهولة.</p>
      </a>
    </nav>

    <footer class="footer">
      المطور: الأستاذ محمد قادري
    </footer>
  </div>

  <script>
    (function() {
      const cards = Array.from(document.querySelectorAll('.card'));
      if (!cards.length) return;

      // التركيز المبدئي على البطاقة الأولى لتفعيل التنقل الفوري
      cards[0].focus({ preventScroll: true });

      /**
       * تحديد اتجاه عرض البطاقات بناءً على flex-direction
       */
      function getOrientation() {
        const container = document.getElementById('cardsContainer');
        if (!container) return 'horizontal';
        const style = window.getComputedStyle(container);
        const direction = style.flexDirection;
        return direction === 'row' || direction === 'row-reverse' ? 'horizontal' : 'vertical';
      }

      /**
       * حساب الفهرس الجديد بالاعتماد على المفتاح المضغوط
       */
      function getNextIndex(current, key, total, orientation) {
        if (orientation === 'horizontal') {
          if (key === 'ArrowRight') return (current + 1) % total;
          if (key === 'ArrowLeft') return (current - 1 + total) % total;
          // دعم إضافي للتنقل العمودي في الوضع الأفقي (مرونة)
          if (key === 'ArrowDown') return (current + 1) % total;
          if (key === 'ArrowUp') return (current - 1 + total) % total;
        } else {
          if (key === 'ArrowDown') return (current + 1) % total;
          if (key === 'ArrowUp') return (current - 1 + total) % total;
          if (key === 'ArrowRight') return (current + 1) % total;
          if (key === 'ArrowLeft') return (current - 1 + total) % total;
        }
        return current;
      }

      document.addEventListener('keydown', (e) => {
        const active = document.activeElement;
        if (!active || !active.classList.contains('card')) return;

        const currentIndex = cards.indexOf(active);
        if (currentIndex === -1) return;

        const orientation = getOrientation();
        const newIndex = getNextIndex(currentIndex, e.key, cards.length, orientation);

        if (newIndex !== currentIndex) {
          e.preventDefault();
          cards[newIndex].focus({ preventScroll: false });
        }
      });
    })();
  </script>
</body>
</html>
