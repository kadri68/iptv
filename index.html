<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPTV Ultimate Hub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
min-height:100vh;
background:
linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0891b2);
background-size:400% 400%;
animation:bg 15s ease infinite;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:95%;
max-width:1100px;
text-align:center;
position:relative;
z-index:2;
}

.logo{
font-size:90px;
margin-bottom:10px;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
50%{transform:translateY(-10px);}
}

h1{
font-size:3rem;
color:white;
margin-bottom:10px;
text-shadow:0 0 20px rgba(255,255,255,.5);
}

.subtitle{
color:#f1f5f9;
font-size:1.1rem;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.card{
text-decoration:none;
padding:40px;
border-radius:30px;
backdrop-filter:blur(20px);
background:rgba(255,255,255,.12);
border:1px solid rgba(255,255,255,.2);
color:white;
transition:.4s;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.card:hover{
transform:translateY(-12px) scale(1.03);
box-shadow:0 20px 50px rgba(0,0,0,.45);
}

.card-icon{
font-size:80px;
margin-bottom:20px;
}

.card h2{
font-size:2rem;
margin-bottom:15px;
}

.card p{
line-height:1.9;
font-size:1rem;
opacity:.9;
}

.player{
background:linear-gradient(135deg,
rgba(0,255,170,.25),
rgba(0,150,255,.25));
}

.converter{
background:linear-gradient(135deg,
rgba(255,120,0,.25),
rgba(255,0,150,.25));
}

.footer{
margin-top:40px;
color:white;
opacity:.8;
}

.circle{
position:absolute;
border-radius:50%;
filter:blur(90px);
z-index:1;
}

.c1{
width:250px;
height:250px;
background:#00ffff55;
top:-50px;
right:-50px;
}

.c2{
width:250px;
height:250px;
background:#ff00ff55;
bottom:-50px;
left:-50px;
}
</style>
</head>

<body>

<div class="circle c1"></div>
<div class="circle c2"></div>

<div class="container">

<div class="logo">📡</div>

<h1>IPTV ULTIMATE HUB</h1>

<div class="subtitle">
منصة احترافية لمشاهدة القنوات وإدارة روابط IPTV
</div>

<div class="cards">

<a href="player/index.html" class="card player">

<div class="card-icon">📺</div>

<h2>مشاهدة التلفاز</h2>

<p>
استمتع بمشاهدة القنوات والبث المباشر
بواجهة سهلة وسريعة ومتوافقة مع جميع الأجهزة.
</p>

</a>

<a href="converter/index.html" class="card converter">

<div class="card-icon">🔄</div>

<h2>تحويل الروابط</h2>

<p>
تحويل روابط IPTV إلى صيغ مختلفة
بسرعة وسهولة مع دعم Xtream Codes.
</p>

</a>

</div>

<div class="footer">
© IPTV Ultimate Hub
</div>

</div>

</body>
</html>
