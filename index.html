<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IPTV Finder Pro - Dual Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #0b0f1c;
            --card: #151b2c;
            --header: #0a0e17;
            --accent: #00c2ff;
            --accent2: #ff8c00;
            --text: #f0f4ff;
            --border: #2a3144;
            --focus-glow: #00c2ff;
            --active-source: #00e676;
            --grad1: #0b0f1c;
            --grad2: #1a1f33;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family:"Tahoma",sans-serif; }
        body {
            background: linear-gradient(135deg, var(--grad1) 0%, var(--grad2) 100%);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 18px;
        }
        header {
            background: var(--header);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.7);
            z-index: 10;
            border-bottom: 2px solid var(--accent);
        }
        header h1 { color: var(--accent); font-size: 24px; margin: 0; text-shadow: 0 0 10px var(--accent); }
        .header-btns { display: flex; gap: 10px; }
        .header-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: white;
            padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 18px; transition: 0.2s;
        }
        .header-btn:focus { background: var(--focus-glow); color: #000; box-shadow: 0 0 15px var(--focus-glow); outline: none; }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* Dashboard */
        #dashboardScreen { display: flex; flex-direction: column; padding: 20px; overflow-y: auto; flex: 1; }
        .section-title { font-size: 24px; color: var(--accent2); margin-bottom: 15px; text-shadow: 0 0 8px var(--accent2); }
        .playlists-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .playlist-card {
            background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 20px;
            cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 10px; font-size: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .playlist-card:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent); background: #1f2a44; outline: none; }
        .playlist-card i { font-size: 28px; color: var(--accent); }
        .delete-btn { margin-left: auto; background: transparent; border: none; color: #f44336; font-size: 22px; cursor: pointer; }
        .add-playlist-box { display: flex; gap: 10px; margin-top: 15px; }
        .add-playlist-box input { flex: 1; padding: 12px; border: 2px solid var(--border); border-radius: 10px; background: var(--card); color: white; font-size: 18px; }
        .btn { padding: 12px 20px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #000; }
        .btn:focus { outline: 3px solid white; box-shadow: 0 0 15px var(--accent); }

        /* Channels screen */
        #channelsScreen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
        #channelsScreen.active { display: flex; }
        .player-section { flex: 1; background: black; display: flex; flex-direction: column; border-bottom: 3px solid var(--accent); min-height: 0; }
        .player-wrapper { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .player-status { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #ccc; font-size: 24px; z-index: 5; }
        .channel-info-bar { background: var(--header); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .channel-info-bar h3 { font-size: 22px; color: var(--accent); }
        .info-actions button { background: var(--accent); border: none; color: black; font-weight: bold; padding: 8px 12px; border-radius: 8px; margin-left: 8px; cursor: pointer; font-size: 16px; }
        .control-bar { background: var(--card); padding: 10px 15px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; border-top: 2px solid var(--border); z-index: 20; }
        .control-bar button, .control-bar select, .control-bar input { padding: 10px 16px; border: 2px solid var(--border); border-radius: 10px; background: var(--bg); color: white; font-size: 18px; cursor: pointer; }
        .control-bar button:focus, .control-bar select:focus, .control-bar input:focus { border-color: var(--accent); box-shadow: 0 0 15px var(--accent); outline: none; }

        /* قائمة منسدلة */
        .channels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 100; justify-content: center; align-items: flex-end; }
        .channels-overlay.active { display: flex; }
        .channels-panel { background: var(--card); width: 100%; max-height: 70vh; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 -10px 30px black; border: 2px solid var(--border); border-bottom: none; }
        .panel-header { padding: 15px; background: var(--header); display: flex; justify-content: space-between; align-items: center; }
        .panel-header h2 { color: var(--accent); font-size: 24px; }
        .close-btn { background: transparent; border: none; color: white; font-size: 32px; cursor: pointer; }
        .channels-list { flex: 1; overflow-y: auto; padding: 5px 0; }
        .channel-row { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer; font-size: 20px; user-select: none; }
        .channel-row:focus { background: var(--accent) !important; color: black !important; outline: none; box-shadow: inset 0 0 20px rgba(0,0,0,0.3); }
        .channel-row img { width: 60px; height: 45px; object-fit: contain; background: black; border-radius: 6px; margin-left: 15px; }
        .channel-info { flex: 1; display: flex; align-items: center; gap: 10px; }
        .external-icon { color: var(--accent2); font-size: 22px; cursor: pointer; padding: 5px; }
        .fav-btn { background: transparent; border: none; font-size: 24px; cursor: pointer; margin-left: 5px; }

        /* مودال */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; z-index: 200; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--card); border-radius: 20px; padding: 25px; width: 90%; max-width: 450px; border: 2px solid var(--accent); box-shadow: 0 0 40px var(--accent); }
        .modal-content h3 { color: var(--accent); text-align: center; font-size: 26px; margin-bottom: 20px; }
        .option-btn { display: flex; align-items: center; gap: 12px; padding: 15px; background: var(--bg); border: 2px solid var(--border); border-radius: 12px; margin-bottom: 10px; cursor: pointer; font-size: 20px; width: 100%; color: white; }
        .option-btn:focus { border-color: var(--accent2); background: var(--accent2); color: black; }
        .cancel-btn { display: block; width: 100%; margin-top: 15px; padding: 12px; background: transparent; border: 2px solid var(--border); color: white; border-radius: 12px; font-size: 20px; cursor: pointer; text-align: center; }
        footer { background: var(--header); padding: 8px; text-align: center; border-top: 2px solid var(--border); font-size: 14px; color: #aaa; }

        /* الوضع الفاتح */
        body.light-mode {
            --bg: #f5f7ff; --card: #ffffff; --header: #e0e5f0; --text: #0b0f1c;
            --border: #c0c5d0; --grad1: #e8ecf5; --grad2: #cfd5e8;
        }
    </style>
</head>
<body>

<header>
    <h1>📺 IPTV Pro | <span id="modeLabel">تلفاز</span></h1>
    <div class="header-btns">
        <button class="header-btn" id="backToDashboardBtn" onclick="goToDashboard()" style="display:none;">🏠 القوائم</button>
        <button class="header-btn" id="switchModeBtn" onclick="toggleDeviceMode()">📱 ⇄ 📺</button>
        <button class="header-btn" id="themeBtn" onclick="toggleTheme()">🌓</button>
    </div>
</header>

<div class="main-wrapper">
    <div id="dashboardScreen">
        <div class="section-title">📋 قوائم التشغيل المحفوظة</div>
        <div class="playlists-grid" id="playlistsGrid"></div>
        <div class="add-playlist-box">
            <input type="text" id="newPlaylistUrl" placeholder="رابط M3U أو اسم للقائمة...">
            <button class="btn btn-primary" onclick="addNewPlaylist()">➕ أضف قائمة</button>
            <button class="btn" onclick="document.getElementById('dashboardFileInput').click()">📂 ملف</button>
        </div>
        <input type="file" id="dashboardFileInput" accept=".m3u,.m3u8" style="display:none;">
        <div style="margin-top:20px;">
            <p style="color:var(--accent2); margin-bottom:10px;">مصادر جاهزة:</p>
            <div style="display:flex; gap:10px; flex-wrap:wrap;" id="presetSources"></div>
        </div>
    </div>

    <div id="channelsScreen">
        <div class="player-section">
            <div class="player-wrapper" id="playerWrapper">
                <video id="videoPlayer" controls></video>
                <div class="player-status" id="playerStatus">اختر قناة للبدء</div>
            </div>
            <div class="channel-info-bar">
                <h3 id="currentChannelName">لم يتم تحديد قناة</h3>
                <div class="info-actions">
                    <span id="workingStats" style="color:#00e676; font-size:18px;">0</span>
                    <button id="copyLinkBtn" onclick="copyCurrentLink()" style="display:none;">📋 نسخ الرابط</button>
                    <button id="resetPlayerChoiceBtn" onclick="resetPlayerChoice()" style="display:none;">⚙️</button>
                    <button id="reloadBtn" onclick="reloadCurrentPlaylist()" style="display:none;">🔄 إعادة تحميل</button>
                </div>
            </div>
        </div>
        <div class="control-bar">
            <button onclick="toggleChannelsPanel()">📺 القنوات</button>
            <select id="categoryFilter" onchange="applyFilters()"><option value="all">كل التصنيفات</option></select>
            <input type="text" id="searchInput" placeholder="🔍 بحث...">
            <button onclick="showFavorites()">⭐ المفضلة</button>
            <button onclick="resetAndShowAll()">🔄 الكل</button>
        </div>
    </div>
</div>

<div class="channels-overlay" id="channelsOverlay">
    <div class="channels-panel">
        <div class="panel-header">
            <h2>القنوات</h2>
            <button class="close-btn" onclick="toggleChannelsPanel()">✕</button>
        </div>
        <div class="channels-list" id="channelsContainer"></div>
    </div>
</div>

<div class="modal-overlay" id="playerModal">
    <div class="modal-content" id="playerModalContent">
        <h3>🎬 تشغيل خارجي</h3>
        <button class="option-btn" id="externalPlayerBtn" tabindex="0"><i class="fa fa-external-link-alt"></i> فتح بتطبيق فيديو</button>
        <button class="option-btn" id="copyLinkBtnModal" tabindex="0"><i class="fa fa-copy"></i> نسخ الرابط</button>
        <label style="display:flex; align-items:center; gap:10px; color:white; font-size:18px; margin:10px 0;">
            <input type="checkbox" id="alwaysExternalCheck"> استخدم التطبيق الخارجي دائماً
        </label>
        <button class="cancel-btn" tabindex="0" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<footer>الأستاذ محمد قادري | ثانوية محمد الأخضر فيلالي | غرداية | kadri68@gmail.com | 0662692987</footer>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    // ---- الإعدادات العامة ----
    let isTVMode = localStorage.getItem("deviceMode") === "tv" || (window.innerWidth > 1024 && !localStorage.getItem("deviceMode"));
    document.getElementById("modeLabel").textContent = isTVMode ? "تلفاز" : "هاتف";

    const presetSources = [
        { id: 'ishak', name: 'Ishak', url: 'https://raw.githubusercontent.com/kadri68/-/refs/heads/main/ishak.m3u' },
        { id: 'k2', name: 'K2', url: 'https://raw.githubusercontent.com/kadri68/-/refs/heads/main/k2.m3u' },
        { id: 'k3', name: 'K3', url: 'https://raw.githubusercontent.com/kadri68/-/refs/heads/main/k3.m3u' },
        { id: 'ara', name: 'عربية', url: 'https://iptv-org.github.io/iptv/languages/ara.m3u' },
        { id: 'sports', name: 'رياضة', url: 'https://iptv-org.github.io/iptv/categories/sports.m3u' }
    ];

    let playlists = JSON.parse(localStorage.getItem("playlists") || "[]");
    let channels = [], filteredChannels = [];
    let favorites = JSON.parse(localStorage.getItem("favorites") || "[]");
    let currentHlsInstance = null;
    const video = document.getElementById("videoPlayer");
    const statusEl = document.getElementById("playerStatus");
    let currentChannelUrl = '';
    let useExternalPlayer = localStorage.getItem("useExternalPlayer") === "true";
    let activePlaylistIndex = -1;
    let currentFilterCategory = 'all';
    let longPressTimer = null;

    // ---- تبديل الوضع (تلفاز/هاتف) ----
    function toggleDeviceMode() {
        isTVMode = !isTVMode;
        localStorage.setItem("deviceMode", isTVMode ? "tv" : "phone");
        document.getElementById("modeLabel").textContent = isTVMode ? "تلفاز" : "هاتف";
        // إعادة ضبط خيار المشغل الخارجي
        if (isTVMode) {
            useExternalPlayer = true; // في وضع التلفاز اجعل VLC الافتراضي
            document.getElementById("resetPlayerChoiceBtn").style.display = "none";
        } else {
            useExternalPlayer = localStorage.getItem("useExternalPlayer") === "true";
        }
    }

    // ---- دوال العرض ----
    function renderDashboard() {
        const grid = document.getElementById("playlistsGrid");
        grid.innerHTML = playlists.map((p, idx) => `
            <div class="playlist-card" tabindex="0" onclick="loadPlaylist(${idx})">
                <i class="fa fa-list"></i>
                <span>${p.name}</span>
                <button class="delete-btn" onclick="event.stopPropagation(); deletePlaylist(${idx})"><i class="fa fa-trash"></i></button>
            </div>
        `).join("");

        const presetDiv = document.getElementById("presetSources");
        presetDiv.innerHTML = presetSources.map(src => `
            <button class="btn" onclick="loadPresetSource('${src.id}')" style="background:var(--accent2); color:black;">${src.name}</button>
        `).join("");
    }

    async function loadPresetSource(id) {
        const src = presetSources.find(s => s.id === id);
        if (!src) return;
        const newPlaylist = { name: src.name, url: src.url, content: null };
        playlists.push(newPlaylist);
        const idx = playlists.length - 1;
        localStorage.setItem("playlists", JSON.stringify(playlists));
        renderDashboard();
        await loadPlaylist(idx);
    }

    function addNewPlaylist() {
        const input = document.getElementById("newPlaylistUrl");
        const val = input.value.trim();
        if (!val) return;
        if (val.startsWith("http")) {
            const name = prompt("اسم القائمة:", "قائمة جديدة") || "قائمة جديدة";
            playlists.push({ name, url: val, content: null });
        } else {
            playlists.push({ name: val, url: "", content: null });
        }
        localStorage.setItem("playlists", JSON.stringify(playlists));
        renderDashboard();
        input.value = "";
        if (playlists.length > 0) loadPlaylist(playlists.length - 1);
    }

    function deletePlaylist(idx) {
        playlists.splice(idx, 1);
        localStorage.setItem("playlists", JSON.stringify(playlists));
        renderDashboard();
    }

    document.getElementById("dashboardFileInput").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const content = ev.target.result;
            const name = file.name.replace(/\.[^/.]+$/, "");
            playlists.push({ name, url: "", content });
            localStorage.setItem("playlists", JSON.stringify(playlists));
            renderDashboard();
            loadPlaylist(playlists.length - 1);
        };
        reader.readAsText(file);
    });

    async function loadPlaylist(idx) {
        if (idx < 0 || idx >= playlists.length) return;
        activePlaylistIndex = idx;
        const pl = playlists[idx];
        showChannelsScreen();
        document.getElementById("reloadBtn").style.display = "inline-block";
        statusEl.textContent = "جاري تحميل القائمة...";
        if (pl.content) {
            parseM3U(pl.content);
            populateCategoryFilter();
            applyFilters();
            statusEl.textContent = "اختر قناة للبدء";
        } else if (pl.url) {
            const success = await fetchCustomSource(pl.url);
            if (success) {
                const savedContent = localStorage.getItem("saved_m3u_content");
                if (savedContent) {
                    playlists[idx].content = savedContent;
                    localStorage.setItem("playlists", JSON.stringify(playlists));
                }
            } else {
                document.getElementById("channelsContainer").innerHTML = "<div style='padding:30px;text-align:center;'>❌ فشل تحميل القائمة. تأكد من الرابط أو الاتصال بالإنترنت.</div>";
                statusEl.textContent = "فشل التحميل";
            }
        } else {
            document.getElementById("channelsContainer").innerHTML = "<div style='padding:30px;text-align:center;'>لا يوجد محتوى.</div>";
        }
    }

    function reloadCurrentPlaylist() {
        if (activePlaylistIndex >= 0) {
            const pl = playlists[activePlaylistIndex];
            if (pl.url) {
                pl.content = null;
                localStorage.setItem("playlists", JSON.stringify(playlists));
            }
            loadPlaylist(activePlaylistIndex);
        }
    }

    async function fetchCustomSource(url) {
        const container = document.getElementById("channelsContainer");
        container.innerHTML = "<div style='text-align:center;padding:20px;'>⏳ جاري تنزيل القنوات...</div>";
        try {
            const response = await fetch(url, { mode: 'cors' });
            if (!response.ok) throw new Error(`HTTP error ${response.status}`);
            const text = await response.text();
            if (!text.trim()) throw new Error("القائمة فارغة");
            localStorage.setItem("saved_m3u_content", text);
            parseM3U(text);
            populateCategoryFilter();
            applyFilters();
            statusEl.textContent = "اختر قناة للبدء";
            return true;
        } catch (e) {
            console.error(e);
            container.innerHTML = `<div style='padding:30px;text-align:center;'>❌ فشل تحميل القائمة (${e.message}). <br> <button class="btn" onclick="reloadCurrentPlaylist()">🔄 إعادة المحاولة</button></div>`;
            return false;
        }
    }

    function showDashboard() {
        document.getElementById("dashboardScreen").style.display = "flex";
        document.getElementById("channelsScreen").classList.remove("active");
        document.getElementById("backToDashboardBtn").style.display = "none";
        video.pause();
        video.style.display = "none";
        statusEl.textContent = "اختر قناة للبدء";
    }

    function goToDashboard() { showDashboard(); }

    function showChannelsScreen() {
        document.getElementById("dashboardScreen").style.display = "none";
        document.getElementById("channelsScreen").classList.add("active");
        document.getElementById("backToDashboardBtn").style.display = "block";
        video.style.display = "block";
    }

    function parseM3U(content, append = false) {
        if (!append) channels = [];
        const lines = content.split(/\r?\n/);
        let cur = {};
        lines.forEach(line => {
            line = line.trim();
            if (line.startsWith("#EXTINF")) {
                cur = {};
                cur.name = line.split(",").pop()?.trim() || "غير معروف";
                cur.logo = (line.match(/tvg-logo="([^"]+)"/) || [])[1] || "";
                cur.group = (line.match(/group-title="([^"]*)"/) || [])[1] || "عام";
            } else if (line && !line.startsWith("#")) {
                cur.url = line;
                if (cur.name) channels.push({ ...cur });
            }
        });
    }

    function populateCategoryFilter() {
        const cats = new Set(channels.map(c => c.group));
        const sel = document.getElementById("categoryFilter");
        sel.innerHTML = '<option value="all">كل التصنيفات</option>';
        [...cats].sort().forEach(c => {
            sel.innerHTML += `<option value="${c}">${c}</option>`;
        });
        sel.value = 'all';
        currentFilterCategory = 'all';
    }

    function applyFilters() {
        const kw = document.getElementById("searchInput").value.toLowerCase();
        currentFilterCategory = document.getElementById("categoryFilter").value;
        filteredChannels = channels.filter(c => {
            return (currentFilterCategory === 'all' || c.group === currentFilterCategory) &&
                (!kw || c.name.toLowerCase().includes(kw));
        });
        renderChannels(filteredChannels);
    }

    function renderChannels(data) {
        const container = document.getElementById("channelsContainer");
        container.innerHTML = "";
        if (!data.length) {
            container.innerHTML = "<div style='padding:30px;text-align:center;'>لا توجد قنوات</div>";
            return;
        }
        const limit = Math.min(data.length, 1500);
        for (let i = 0; i < limit; i++) {
            const ch = data[i];
            const row = document.createElement("div");
            row.className = "channel-row";
            row.tabIndex = 0;
            const isFav = favorites.some(f => f.url === ch.url);
            row.innerHTML = `
                <img src="${ch.logo || 'https://via.placeholder.com/150x100?text=TV'}" onerror="this.src='https://via.placeholder.com/150x100?text=TV'">
                <div class="channel-info"><span>${ch.name}</span></div>
                <i class="fa fa-external-link-alt external-icon" title="تشغيل خارجي" onclick="event.stopPropagation(); handleExternalPlay('${ch.url.replace(/'/g, "\\'")}', '${ch.name.replace(/'/g, "\\'")}')"></i>
                <button class="fav-btn" style="color:${isFav ? '#f59e0b' : 'gray'};" onclick="event.stopPropagation(); toggleFavorite('${ch.url.replace(/'/g, "\\'")}', '${ch.name.replace(/'/g, "\\'")}', this)">★</button>
            `;

            row.addEventListener("click", () => selectChannel(ch.url, ch.name));
            row.addEventListener("keydown", (e) => {
                if (e.key === "Enter") {
                    e.preventDefault();
                    if (!longPressTimer) {
                        longPressTimer = setTimeout(() => {
                            longPressTimer = null;
                            handleExternalPlay(ch.url, ch.name);
                        }, 600);
                    }
                } else if (e.key === "ArrowDown" || e.key === "ArrowUp") {
                    e.preventDefault();
                    const rows = [...container.querySelectorAll(".channel-row")];
                    const idx = rows.indexOf(row);
                    const next = e.key === "ArrowDown" ? idx + 1 : idx - 1;
                    if (next >= 0 && next < rows.length) {
                        rows[next].focus();
                        rows[next].scrollIntoView({ block: "nearest" });
                    }
                }
            });
            row.addEventListener("keyup", (e) => {
                if (e.key === "Enter" && longPressTimer) {
                    clearTimeout(longPressTimer);
                    longPressTimer = null;
                    selectChannel(ch.url, ch.name);
                }
            });

            container.appendChild(row);
        }
        document.getElementById("workingStats").textContent = data.length;
    }

    function selectChannel(url, name) {
        if (isTVMode || useExternalPlayer) {
            openExternalPlayer(url, name);
        } else {
            playChannel(url, name);
        }
        // إغلاق قائمة القنوات بعد الاختيار
        document.getElementById("channelsOverlay").classList.remove("active");
    }

    function handleExternalPlay(url, name) {
        if (isTVMode) {
            openVLC(url, name);
        } else {
            showPlayerModal(url, name);
        }
    }

    function playChannel(url, name) {
        currentChannelUrl = url;
        document.getElementById("currentChannelName").textContent = name;
        document.getElementById("copyLinkBtn").style.display = "inline-block";
        document.getElementById("resetPlayerChoiceBtn").style.display = (!isTVMode && useExternalPlayer) ? "inline-block" : "none";
        statusEl.style.display = "block";
        statusEl.textContent = "جارٍ تشغيل " + name + "...";
        video.style.display = "block";
        if (currentHlsInstance) { currentHlsInstance.destroy(); currentHlsInstance = null; }
        video.pause(); video.removeAttribute("src"); video.load();
        const isHls = url.includes(".m3u8");
        if (isHls && Hls.isSupported()) {
            currentHlsInstance = new Hls({ enableWorker: true });
            currentHlsInstance.loadSource(url);
            currentHlsInstance.attachMedia(video);
            currentHlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(() => {}));
        } else {
            video.src = url;
            video.play().catch(() => statusEl.textContent = "اضغط ▶");
        }
        video.onplaying = () => statusEl.style.display = "none";
        video.onwaiting = () => { statusEl.style.display = "block"; statusEl.textContent = "⏳ تحميل..."; };
        video.onerror = () => statusEl.textContent = "❌ فشل البث";
    }

    function buildVideoIntent(url, pkg = null) {
        try {
            const u = new URL(url);
            const base = `intent://${u.host}${u.pathname}${u.search}${u.hash}#Intent;scheme=${u.protocol.replace(':','')};type=video/*`;
            return pkg ? `${base};package=${pkg};end;` : `${base};end;`;
        } catch (e) {
            return url;
        }
    }

    function openVLC(url, name) {
        if (name) document.getElementById("currentChannelName").textContent = name;
        const intentUrl = buildVideoIntent(url, "org.videolan.vlc");
        try { window.location.href = intentUrl; } catch (e) { window.open(url, "_blank"); }
        closeModal();
    }

    function openExternalPlayer(url, name) {
        if (name) document.getElementById("currentChannelName").textContent = name;
        const intentUrl = isTVMode ? buildVideoIntent(url, "org.videolan.vlc") : buildVideoIntent(url);
        try { window.location.href = intentUrl; } catch (e) { window.open(url, "_blank"); }
        closeModal();
    }

    let modalUrl = "";
    function showPlayerModal(url, name) {
        if (isTVMode) {
            openVLC(url, name);
            return;
        }
        modalUrl = url;
        document.getElementById("playerModal").classList.add("active");
        document.getElementById("alwaysExternalCheck").checked = useExternalPlayer;
        // تركيز الزر الأول للمودال
        setTimeout(() => document.getElementById("externalPlayerBtn").focus(), 100);
    }
    function closeModal() { document.getElementById("playerModal").classList.remove("active"); }

    document.getElementById("externalPlayerBtn").addEventListener("click", () => {
        if (document.getElementById("alwaysExternalCheck").checked) {
            localStorage.setItem("useExternalPlayer", "true");
            useExternalPlayer = true;
            document.getElementById("resetPlayerChoiceBtn").style.display = "inline-block";
        }
        openExternalPlayer(modalUrl);
    });
    document.getElementById("copyLinkBtnModal").addEventListener("click", () => {
        navigator.clipboard.writeText(modalUrl).then(() => alert("تم النسخ!"));
        closeModal();
    });

    // التنقل داخل المودال باستخدام الريموت
    document.getElementById("playerModalContent").addEventListener("keydown", (e) => {
        const focusable = [...document.querySelectorAll("#playerModalContent [tabindex]")];
        const idx = focusable.indexOf(document.activeElement);
        if (e.key === "ArrowDown") {
            e.preventDefault();
            const next = (idx + 1) % focusable.length;
            focusable[next].focus();
        } else if (e.key === "ArrowUp") {
            e.preventDefault();
            const prev = (idx - 1 + focusable.length) % focusable.length;
            focusable[prev].focus();
        }
    });

    function resetPlayerChoice() {
        localStorage.removeItem("useExternalPlayer");
        useExternalPlayer = false;
        document.getElementById("resetPlayerChoiceBtn").style.display = "none";
        alert("تم إعادة التعيين.");
    }
    function copyCurrentLink() {
        if (currentChannelUrl) navigator.clipboard.writeText(currentChannelUrl).then(() => alert("تم النسخ!"));
    }

    function toggleFavorite(url, name, btn) {
        const idx = favorites.findIndex(f => f.url === url);
        if (idx > -1) { favorites.splice(idx, 1); btn.style.color = "gray"; }
        else { favorites.push({ url, name }); btn.style.color = "#f59e0b"; }
        localStorage.setItem("favorites", JSON.stringify(favorites));
    }

    function showFavorites() {
        const favChannels = channels.filter(c => favorites.some(f => f.url === c.url));
        renderChannels(favChannels);
        document.getElementById("channelsOverlay").classList.add("active");
    }
    function resetAndShowAll() {
        document.getElementById("searchInput").value = "";
        document.getElementById("categoryFilter").value = "all";
        currentFilterCategory = "all";
        applyFilters();
        document.getElementById("channelsOverlay").classList.add("active");
    }
    function toggleChannelsPanel() {
        document.getElementById("channelsOverlay").classList.toggle("active");
        if (document.getElementById("channelsOverlay").classList.contains("active")) {
            const firstRow = document.querySelector(".channel-row");
            if (firstRow) firstRow.focus();
        }
    }
    document.getElementById("channelsOverlay").addEventListener("click", function(e) {
        if (e.target === this) toggleChannelsPanel();
    });

    // ---- التحكم العام بالريموت: أثناء المشاهدة، الضغط على OK يظهر القائمة ----
    document.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && document.getElementById("channelsScreen").classList.contains("active")) {
            // إذا كانت القائمة غير ظاهرة وكان المشغل يعمل، أظهرها
            const overlay = document.getElementById("channelsOverlay");
            if (!overlay.classList.contains("active") && video.src && !video.paused) {
                e.preventDefault();
                toggleChannelsPanel();
            }
        }
    });

    // منع المشغل من اعتراض مفاتيح الريموت
    video.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === "ArrowUp" || e.key === "ArrowDown") {
            e.preventDefault();
        }
    });

    function toggleTheme() {
        document.body.classList.toggle("light-mode");
        document.getElementById("themeBtn").innerHTML = document.body.classList.contains("light-mode") ? "☀️" : "🌓";
        localStorage.setItem("theme", document.body.classList.contains("light-mode") ? "light" : "dark");
    }
    if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light-mode");
        document.getElementById("themeBtn").innerHTML = "☀️";
    }

    window.onload = () => {
        renderDashboard();
        if (!isTVMode && useExternalPlayer) document.getElementById("resetPlayerChoiceBtn").style.display = "inline-block";
        if (isTVMode) useExternalPlayer = true; // تأكيد وضع VLC
        const firstCard = document.querySelector(".playlist-card");
        if (firstCard) firstCard.focus();
    };
</script>
</body>
</html>
